<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Espejo Wella · Koleston Perfect</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a1628; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; user-select: none; }

  #stage { position: fixed; inset: 0; }
  #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #output { position: absolute; inset: 0; width: 100%; height: 100%; }

  #topBar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 24px 32px;
    display: flex; justify-content: space-between; align-items: flex-start;
    z-index: 5; pointer-events: none; gap: 20px;
  }
  #logos {
    display: flex; align-items: center; gap: 18px;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.7));
  }
  #logos img.wella { height: 54px; width: auto; }
  #logos img.koleston { height: 44px; width: auto; }

  #currentTone {
    background: rgba(10, 22, 40, 0.78);
    padding: 16px 22px;
    border-radius: 14px;
    backdrop-filter: blur(12px);
    text-align: right;
    min-width: 280px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  #currentTone .header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; margin-bottom: 10px;
    padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #currentTone .header img { height: 46px; width: auto; }
  #currentTone .label { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.14em; }
  #currentTone .name { font-size: 22px; font-weight: 500; margin-top: 2px; }
  #currentTone .code { font-size: 14px; opacity: 0.75; font-family: ui-monospace, monospace; margin-top: 3px; }
  #currentTone .family { font-size: 10px; opacity: 0.55; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; }
  #currentTone .lift { font-size: 10px; opacity: 0.75; margin-top: 4px; color: #ffb347; }

  #instructionsBar {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 22, 40, 0.75);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    backdrop-filter: blur(14px);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 28px;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #instructionsBar.hidden { opacity: 0; }
  .instr-step { display: flex; align-items: center; gap: 12px; }
  .instr-step + .instr-step::before {
    content: ""; width: 18px; height: 1px;
    background: rgba(255,255,255,0.2); margin-right: -4px;
  }
  .instr-step .icon {
    width: 52px; height: 52px; flex-shrink: 0;
    background: rgba(255,255,255,0.06); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .instr-step .icon svg { width: 38px; height: 38px; }
  .instr-step .num { font-size: 9px; opacity: 0.5; font-weight: 500; letter-spacing: 0.15em; }
  .instr-step .desc { font-size: 13px; line-height: 1.3; opacity: 0.92; max-width: 150px; margin-top: 2px; }
  .instr-step .desc b { font-weight: 600; }

  #status {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(10, 22, 40, 0.6); padding: 4px 12px; border-radius: 16px;
    font-size: 10px; font-family: ui-monospace, monospace; z-index: 5; opacity: 0.6;
  }

  #paletteOverlay {
    position: absolute;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%) translateY(30px);
    display: flex; flex-direction: column; gap: 16px;
    padding: 22px 26px;
    background: rgba(10, 22, 40, 0.88);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(18px);
    z-index: 6; max-width: 92%;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #paletteOverlay.visible {
    opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto;
  }

  #paletteHeader {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #paletteHeader .brand { display: flex; align-items: center; gap: 14px; }
  #paletteHeader .brand img { height: 38px; width: auto; }
  #paletteHeader .title { font-size: 14px; font-weight: 500; letter-spacing: 0.02em; }

  #familyTabs { display: flex; gap: 4px; }
  .tab {
    background: transparent; color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 12px; border-radius: 18px;
    font-size: 11px; cursor: pointer; font-weight: 500; white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .tab:hover, .tab.hovering { color: #fff; border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.06); }
  .tab.active { background: #fff; color: #0a1628; border-color: #fff; }

  #swatches {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 8px;
    max-width: 900px;
  }
  .swatch {
    position: relative;
    aspect-ratio: 1 / 1.1;
    border-radius: 6px;
    cursor: pointer;
    overflow: hidden;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 10px 6px 0;
  }
  .swatch.hovering {
    transform: scale(1.08);
    border-color: rgba(255,255,255,0.95);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  .swatch.active {
    border-color: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.4);
  }
  .swatch .code {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    line-height: 1;
  }
  .swatch .code.light { color: rgba(0,0,0,0.85); text-shadow: 0 1px 2px rgba(255,255,255,0.3); }
  .swatch .name {
    position: absolute;
    bottom: 6px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    padding: 0 4px;
    line-height: 1.1;
  }
  .swatch .name.light { color: rgba(0,0,0,0.75); text-shadow: none; }

  #controls { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); }
  .ctrl-btn { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 500; }
  .ctrl-btn.hovering { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); }
  .ctrl-btn.primary { background: #fff; color: #0a1628; border-color: #fff; }

  #cursor { position: absolute; width: 60px; height: 60px; margin-left: -30px; margin-top: -30px; pointer-events: none; z-index: 100; opacity: 0; will-change: transform; transition: opacity 0.15s; }
  #cursor.visible { opacity: 1; }
  #cursor svg { width: 100%; height: 100%; overflow: visible; }
  #cursor .ring-bg { fill: none; stroke: rgba(255,255,255,0.4); stroke-width: 3; }
  #cursor .dot { fill: #fff; transition: fill 0.1s; }
  #cursor.pinching .dot { fill: #ff3b5c; }
  #cursor.pinching .ring-bg { stroke: rgba(255,59,92,0.6); }

  #startOverlay { position: absolute; inset: 0; background: rgba(10, 22, 40, 0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; z-index: 50; backdrop-filter: blur(10px); padding: 40px; }
  #startOverlay .logos { display: flex; align-items: center; gap: 22px; margin-bottom: 10px; }
  #startOverlay .logos img.wella { height: 90px; }
  #startOverlay .logos img.koleston { height: 78px; }
  #startOverlay h1 { font-size: 38px; font-weight: 300; letter-spacing: 0.01em; }
  #startOverlay p { opacity: 0.65; font-size: 15px; max-width: 500px; text-align: center; line-height: 1.7; }
  #startOverlay button { background: #fff; color: #0a1628; border: none; padding: 14px 36px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 12px; }
  #startOverlay button:disabled { opacity: 0.4; cursor: default; }

  .hidden-force { display: none !important; }
</style>
</head>

function hexToHSV(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  const v = max;
  const s = max === 0 ? 0 : d / max;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
    if (h < 0) h += 360;
  }
  return { h, s, v };
}

  const hh = h / 60;
  const x = c * (1 - Math.abs((hh % 2) - 1));
  let r = 0, g = 0, b = 0;
  if (hh < 1)      { r = c; g = x; b = 0; }
  else if (hh < 2) { r = x; g = c; b = 0; }
  else if (hh < 3) { r = 0; g = c; b = x; }
  else if (hh < 4) { r = 0; g = x; b = c; }
  else if (hh < 5) { r = x; g = 0; b = c; }
  else             { r = c; g = 0; b = x; }
  const m = v - c;
  out[offset]     = (r + m) * 255;
  out[offset + 1] = (g + m) * 255;
  out[offset + 2] = (b + m) * 255;
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.6;
}

function renderFamilyTabs() {
  familyTabs.innerHTML = "";
  for (const f of FAMILIES) {
    const btn = document.createElement("button");
    btn.className = "tab" + (f === currentFamily ? " active" : "");
    btn.textContent = f;
    btn.addEventListener("click", () => { currentFamily = f; renderFamilyTabs(); renderPalette(); });
    familyTabs.appendChild(btn);
  }
}

function renderPalette() {
  swatchesEl.innerHTML = "";
  const filtered = currentFamily === "Todos" ? TONES : TONES.filter(t => t.family === currentFamily);
  for (const tone of filtered) {
    const el = document.createElement("div");
    el.className = "swatch" + (currentTone && currentTone.code === tone.code ? " active" : "");
    el.style.background = tone.hex;
    const lightClass = isLightColor(tone.hex) ? " light" : "";
    el.innerHTML = `<div class="code${lightClass}">${tone.code}</div><div class="name${lightClass}">${tone.name}</div>`;
    el.addEventListener("click", () => selectTone(tone));
    swatchesEl.appendChild(el);
  }
}

function selectTone(tone) {
  currentTone = tone;
  currentToneHSV = hexToHSV(tone.hex);
  toneNameEl.textContent = tone.name;
  toneCodeEl.textContent = "Koleston " + tone.code;
  toneFamilyEl.textContent = tone.family;
  toneLiftEl.textContent = tone.lift > 0 ? `+ ${tone.lift} niveles de aclarado` : "";
  renderPalette();
  closePalette();
}

function clearTone() {
  currentTone = null;
  currentToneHSV = null;
  toneNameEl.textContent = "Sin tinte";
  toneCodeEl.textContent = "—";
  toneFamilyEl.textContent = "";
  toneLiftEl.textContent = "";
  renderPalette();
}

function openPalette() {
  paletteVisible = true;
  paletteForcedClosed = false;
  paletteOverlay.classList.add("visible");
  instructionsBar.classList.add("hidden");
}

function closePalette() {
  paletteVisible = false;
  paletteOverlay.classList.remove("visible");
  instructionsBar.classList.remove("hidden");
}

document.querySelectorAll(".ctrl-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const a = btn.dataset.action;
    if (a === "clear") clearTone();
    if (a === "close") { paletteForcedClosed = true; closePalette(); }
    if (a === "fullscreen") {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  });
});

async function loadModels() {
  try {
    statusEl.textContent = "cargando WASM...";
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm"
    );
    statusEl.textContent = "cargando modelos...";
    [segmenter, handLandmarker] = await Promise.all([
      ImageSegmenter.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/1/selfie_multiclass_256x256.tflite",
          delegate: "CPU"
        },
        runningMode: "VIDEO",
        outputCategoryMask: true,
        outputConfidenceMasks: false
      }),
      HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      })
    ]);
    statusEl.textContent = "listo";
    startBtn.disabled = false;
    startBtn.textContent = "Activar cámara";
  } catch (err) {
    statusEl.textContent = "error: " + err.message;
    console.error(err);
  }
}

async function start() {
  startBtn.disabled = true;
  startBtn.textContent = "iniciando…";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    resize();
    running = true;
    startOverlay.classList.add("hidden-force");
    predict();
  } catch (err) {
    statusEl.textContent = "error cámara: " + err.message;
    startBtn.disabled = false;
    startBtn.textContent = "reintentar";
    console.error(err);
  }
}

function resize() {
  const aspect = window.innerHeight / window.innerWidth;
  output.width = PROCESS_WIDTH;
  output.height = Math.round(PROCESS_WIDTH * aspect);
  featherCanvas.width = output.width;
  featherCanvas.height = output.height;
}
window.addEventListener("resize", resize);

let fpsCounter = 0, fps = 0, lastFpsTime = performance.now();
let lastHandTime = 0;

function predict() {
  if (!running) return;
  if (video.currentTime !== lastVideoTime && video.readyState >= 2) {
    lastVideoTime = video.currentTime;
    const now = performance.now();

    const handResult = handLandmarker.detectForVideo(video, now);
    processHand(handResult, now);

    if (currentTone) {
      segmenter.segmentForVideo(video, now, (res) => {
        buildFeatherMask(res);
      });
    } else {
      lastFeatherData = null;
      prevMaskGray = null;
    }

    renderFrame();
    updateCursorAndInteraction(now);

    fpsCounter++;
    if (now - lastFpsTime > 500) {
      fps = Math.round((fpsCounter * 1000) / (now - lastFpsTime));
      fpsCounter = 0;
      lastFpsTime = now;
    }
  }
  requestAnimationFrame(predict);
}

function processHand(result, now) {
  if (!result.landmarks || result.landmarks.length === 0) {
    handState.visible = false;
    handState.pinching = false;
    return;
  }
  const lm = result.landmarks[0];
  const w = window.innerWidth, h = window.innerHeight;
  const indexTip = lm[8];
  const newRawX = (1 - indexTip.x) * w;
  const newRawY = indexTip.y * h;

  if (handState.visible && lastHandTime > 0) {
    const dt = Math.max(1, now - lastHandTime);
    handState.vx = (newRawX - handState.rawX) / dt;
    handState.vy = (newRawY - handState.rawY) / dt;
  } else { handState.vx = 0; handState.vy = 0; }

  handState.rawX = newRawX; handState.rawY = newRawY;
  handState.visible = true; handState.lastSeenTime = now;
  lastHandTime = now;

  const thumbTip = lm[4];
  const dx = thumbTip.x - indexTip.x, dy = thumbTip.y - indexTip.y;
  const dist2d = Math.sqrt(dx*dx + dy*dy);
  const wrist = lm[0], middleBase = lm[9];
  const handSize = Math.sqrt((middleBase.x - wrist.x) ** 2 + (middleBase.y - wrist.y) ** 2);
  handState.pinching = (dist2d / handSize) < 0.35;
  handState.handRaised = wrist.y < 0.75;
}

function updateCursorAndInteraction(now) {
  const PREDICT_MS = 70, MAX_PREDICT_PX = 60;
  let predX = handState.rawX + handState.vx * PREDICT_MS;
  let predY = handState.rawY + handState.vy * PREDICT_MS;
  const dpx = predX - handState.rawX, dpy = predY - handState.rawY;
  const pdist = Math.sqrt(dpx*dpx + dpy*dpy);
  if (pdist > MAX_PREDICT_PX) {
    predX = handState.rawX + (dpx / pdist) * MAX_PREDICT_PX;
    predY = handState.rawY + (dpy / pdist) * MAX_PREDICT_PX;
  }
  const SMOOTH = 0.6;
  handState.x = handState.x * (1 - SMOOTH) + predX * SMOOTH;
  handState.y = handState.y * (1 - SMOOTH) + predY * SMOOTH;

  if (handState.visible) {
    cursor.style.transform = `translate(${handState.x}px, ${handState.y}px)`;
    cursor.classList.add("visible");
    cursor.classList.toggle("pinching", handState.pinching);
  } else {
    cursor.classList.remove("visible");
  }

  if (handState.visible && handState.handRaised) {
    if (!paletteVisible && !paletteForcedClosed) openPalette();
    handDownTime = 0;
  } else {
    if (handDownTime === 0) handDownTime = now;
    if (now - handDownTime > 1500) paletteForcedClosed = false;
  }

  let newHovered = null;
  if (handState.visible && paletteVisible) {
    const el = document.elementFromPoint(handState.x, handState.y);
    if (el) newHovered = el.closest(".swatch, .tab, .ctrl-btn");
  }
  if (hoveredElement !== newHovered) {
    if (hoveredElement) hoveredElement.classList.remove("hovering");
    if (newHovered) newHovered.classList.add("hovering");
    hoveredElement = newHovered;
  }

  if (handState.pinching && !handState.wasPinching && !pinchConsumed) {
    pinchConsumed = true;
    if (hoveredElement) hoveredElement.click();
  }
  if (!handState.pinching) pinchConsumed = false;
  handState.wasPinching = handState.pinching;
}

function buildFeatherMask(result) {
  const mask = result.categoryMask;
  if (!mask) return;
  const maskData = mask.getAsUint8Array();
  const maskW = mask.width, maskH = mask.height;
  const w = output.width, h = output.height;

  maskCanvas.width = maskW;
  maskCanvas.height = maskH;
  const maskImage = maskCtx.createImageData(maskW, maskH);
  const maskPixels = maskImage.data;

  for (let y = 0; y < maskH; y++) {
    for (let x = 0; x < maskW; x++) {
      const i = y * maskW + x;
      const cat = maskData[i];
      let v = 0;
      if (cat === 1) {
        let faceNearby = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || ny < 0 || nx >= maskW || ny >= maskH) continue;
            if (maskData[ny * maskW + nx] === 3) faceNearby++;
          }
        }
        v = faceNearby > 5 ? 0 : 255;
      }
      const idx = i * 4;
      maskPixels[idx] = v; maskPixels[idx+1] = v; maskPixels[idx+2] = v; maskPixels[idx+3] = 255;
    }
  }

  maskCtx.putImageData(maskImage, 0, 0);

  featherCtx.clearRect(0, 0, w, h);
  featherCtx.save();
  featherCtx.scale(-1, 1);
  featherCtx.filter = "blur(5px)";
  featherCtx.drawImage(maskCanvas, -w, 0, w, h);
  featherCtx.restore();

  const currentFeather = featherCtx.getImageData(0, 0, w, h);

  if (prevMaskGray && prevMaskGray.length === currentFeather.data.length) {
    const cur = currentFeather.data;
    const prev = prevMaskGray;
    const wA = TEMPORAL_SMOOTH;
    const wB = 1 - TEMPORAL_SMOOTH;
    for (let i = 0; i < cur.length; i += 4) {
      const mixed = cur[i] * wA + prev[i] * wB;
      cur[i] = mixed; cur[i+1] = mixed; cur[i+2] = mixed;
    }
  }
  if (!prevMaskGray || prevMaskGray.length !== currentFeather.data.length) {
    prevMaskGray = new Uint8ClampedArray(currentFeather.data.length);
  }
  prevMaskGray.set(currentFeather.data);

  lastFeatherData = currentFeather;
}

function renderFrame() {
  const w = output.width, h = output.height;

  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -w, 0, w, h);
  ctx.restore();

  if (!currentTone || !lastFeatherData || !currentToneHSV) {
    statusEl.textContent = `${fps} fps · ${handState.visible ? "mano" : "sin mano"}`;
    return;
  }

  const featherPixels = lastFeatherData.data;
  const frame = ctx.getImageData(0, 0, w, h);
  const pixels = frame.data;

  const targetH = currentToneHSV.h;
  const targetS = currentToneHSV.s;
  const targetV = currentToneHSV.v;
  const I = INTENSITY;
  const lift = currentTone.lift;
  const liftFactor = lift * 0.14;
  const out = new Uint8Array(3);

  for (let i = 0; i < pixels.length; i += 4) {
    const weight = featherPixels[i];
    if (weight < 5) continue;
    const w01 = weight / 255;

    const r = pixels[i];
    const g = pixels[i + 1];
    const b = pixels[i + 2];

    const rn = r / 255, gn = g / 255, bn = b / 255;
    const maxC = Math.max(rn, gn, bn);
    const pixV = maxC;

    const effectiveV = pixV + liftFactor * (targetV - pixV);

    hsvToRgbInline(targetH, targetS, effectiveV, out, 0);
    const newR = out[0];
    const newG = out[1];
    const newB = out[2];

    const a = I * w01;
    const ia = 1 - a;
    pixels[i]     = r * ia + newR * a;
    pixels[i + 1] = g * ia + newG * a;
    pixels[i + 2] = b * ia + newB * a;
  }

  ctx.putImageData(frame, 0, 0);
  const liftTxt = lift > 0 ? ` · lift ${lift}` : "";
  statusEl.textContent = `${fps} fps · ${currentTone.code}${liftTxt} · ${handState.visible ? "mano" : "sin mano"}`;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "f" || e.key === "F") {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if (e.key === "Escape") { paletteForcedClosed = true; closePalette(); }
  if (e.key === " ") { openPalette(); paletteForcedClosed = false; }
});

startBtn.addEventListener("click", start);
renderFamilyTabs();
renderPalette();
loadModels();
</script>
</body>
</html>
